name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, for example 0.1.0
        required: true
        type: string
      prerelease:
        description: Mark the GitHub release as prerelease
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  set-release-version:
    uses: ./.github/workflows/set-version.yml
    with:
      version: ${{ inputs.version }}
    secrets: inherit

  release:
    needs: set-release-version
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew build --stacktrace

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: build/libs/*.jar

      - name: Build Changelog
        id: github_release
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          mode: COMMIT
          toTag: ${{ github.ref }}
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "commit_template": "- [`#{{SHORT_MERGE_SHA}}`](https://github.com/6b6t/AnarchyClient/commit/#{{MERGE_SHA}}) #{{TITLE}}",
              "categories": [
                {
                    "title": "## 🚀 Features",
                    "labels": ["feat", "feature"]
                },
                {
                    "title": "## 🐛 Fixes",
                    "labels": ["fix", "bug"]
                },
                {
                    "title": "## 🏎️ Performance",
                    "labels": ["perf"]
                },
                {
                    "title": "## 🏗 Refactor",
                    "labels": ["refactor"]
                },
                {
                    "title": "## 📝 Documentation",
                    "labels": ["docs"]
                },
                {
                    "title": "## 🔨 Build",
                    "labels": ["build", "chore", "ci"]
                },
                {
                    "title": "## 💅 Style",
                    "labels": ["style"]
                },
                {
                    "title": "## 🧪 Tests",
                    "labels": ["test"]
                },
                {
                    "title": "## 💬 Other",
                    "labels": []
                },
                {
                  "title": "## 📦 Dependencies",
                  "labels": ["dependencies"]
                }
              ],
              "empty_template": "no changes",
              "label_extractor": [
                {
                  "pattern": "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test){1}(\\([\\w\\-\\.]+\\))?(!)?: ([\\w ])+([\\s\\S]*)",
                  "on_property": "title",
                  "target": "$1"
                }
              ],
              "custom_placeholders": [
                {
                  "name": "SHORT_MERGE_SHA",
                  "source": "MERGE_SHA",
                  "transformer": {
                    "pattern": "^([0-9a-f]{7})[0-9a-f]*$",
                    "target": "$1"
                  }
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Drop sources jar from release assets
        run: rm -f build/libs/*-sources.jar

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: AnarchyClient ${{ inputs.version }}
          target_commitish: ${{ github.ref_name }}
          prerelease: ${{ inputs.prerelease }}
          body: ${{ steps.github_release.outputs.changelog }}
          files: build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
