name: Release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: Mark the GitHub release as prerelease
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Read release version
        id: release_version
        shell: bash
        run: |
          release_version="$(sed -nE 's/^version = "([^"]+)"/\1/p' build.gradle.kts)"
          if [ -z "$release_version" ]; then
            echo "Could not read version from build.gradle.kts" >&2
            exit 1
          fi
          echo "version=$release_version" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        env:
          GRADLE_USER_HOME: ${{ runner.temp }}/gradle-setup-home
        with:
          cache-disabled: true

      - name: Build release candidate
        env:
          GRADLE_USER_HOME: ${{ runner.temp }}/gradle-user-home-primary
        run: |
          rm -rf .gradle build
          ./gradlew --no-build-cache --refresh-dependencies clean build --stacktrace

      - name: Collect release candidate
        id: release_file
        shell: bash
        run: |
          rm -f build/libs/*-sources.jar
          mapfile -t release_files < <(find build/libs -maxdepth 1 -type f -name '*.jar' -printf '%f\n' | sort)
          if [ "${#release_files[@]}" -ne 1 ]; then
            echo "Expected exactly one release jar in build/libs, found ${#release_files[@]}" >&2
            printf '%s\n' "${release_files[@]}" >&2
            exit 1
          fi
          release_sha256="$(sha256sum "build/libs/${release_files[0]}" | awk '{print $1}')"
          echo "name=${release_files[0]}" >> "$GITHUB_OUTPUT"
          echo "sha256=$release_sha256" >> "$GITHUB_OUTPUT"

      - name: Rebuild release candidate
        env:
          GRADLE_USER_HOME: ${{ runner.temp }}/gradle-user-home-secondary
        run: |
          rm -rf .gradle build
          ./gradlew --no-build-cache --refresh-dependencies clean build --stacktrace

      - name: Verify reproducible release jar
        shell: bash
        run: |
          rm -f build/libs/*-sources.jar
          mapfile -t release_files < <(find build/libs -maxdepth 1 -type f -name '*.jar' -printf '%f\n' | sort)
          if [ "${#release_files[@]}" -ne 1 ]; then
            echo "Expected exactly one release jar in build/libs, found ${#release_files[@]}" >&2
            printf '%s\n' "${release_files[@]}" >&2
            exit 1
          fi

          if [ "${release_files[0]}" != "${{ steps.release_file.outputs.name }}" ]; then
            echo "Release jar name changed between builds: ${{ steps.release_file.outputs.name }} != ${release_files[0]}" >&2
            exit 1
          fi

          actual_sha256="$(sha256sum "build/libs/${release_files[0]}" | awk '{print $1}')"
          expected_sha256="${{ steps.release_file.outputs.sha256 }}"
          if [ "$actual_sha256" != "$expected_sha256" ]; then
            echo "Release jar is not reproducible." >&2
            echo "First build:  $expected_sha256  ${{ steps.release_file.outputs.name }}" >&2
            echo "Second build: $actual_sha256  ${release_files[0]}" >&2
            exit 1
          fi

          echo "Reproducible release jar verified: $actual_sha256  ${release_files[0]}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: build/libs/${{ steps.release_file.outputs.name }}

      - name: Build Changelog
        id: github_release
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          mode: COMMIT
          toTag: ${{ github.ref }}
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "commit_template": "- [`#{{SHORT_MERGE_SHA}}`](https://github.com/6b6t/AnarchyClient/commit/#{{MERGE_SHA}}) #{{TITLE}}",
              "categories": [
                {
                    "title": "## 🚀 Features",
                    "labels": ["feat", "feature"]
                },
                {
                    "title": "## 🐛 Fixes",
                    "labels": ["fix", "bug"]
                },
                {
                    "title": "## 🏎️ Performance",
                    "labels": ["perf"]
                },
                {
                    "title": "## 🏗 Refactor",
                    "labels": ["refactor"]
                },
                {
                    "title": "## 📝 Documentation",
                    "labels": ["docs"]
                },
                {
                    "title": "## 🔨 Build",
                    "labels": ["build", "chore", "ci"]
                },
                {
                    "title": "## 💅 Style",
                    "labels": ["style"]
                },
                {
                    "title": "## 🧪 Tests",
                    "labels": ["test"]
                },
                {
                    "title": "## 💬 Other",
                    "labels": []
                },
                {
                  "title": "## 📦 Dependencies",
                  "labels": ["dependencies"]
                }
              ],
              "empty_template": "no changes",
              "label_extractor": [
                {
                  "pattern": "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test){1}(\\([\\w\\-\\.]+\\))?(!)?: ([\\w ])+([\\s\\S]*)",
                  "on_property": "title",
                  "target": "$1"
                }
              ],
              "custom_placeholders": [
                {
                  "name": "SHORT_MERGE_SHA",
                  "source": "MERGE_SHA",
                  "transformer": {
                    "pattern": "^([0-9a-f]{7})[0-9a-f]*$",
                    "target": "$1"
                  }
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.version }}
          name: AnarchyClient ${{ steps.release_version.outputs.version }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ inputs.prerelease }}
          body: |
            ## Download Links

            | Platform | Download Link |
            |----------|---------------|
            | Minecraft 26.2 | [Download](https://github.com/6b6t/AnarchyClient/releases/download/${{ steps.release_version.outputs.version }}/${{ steps.release_file.outputs.name }}) |

            ## Verify Provenance

            ```bash
            gh release download "${{ steps.release_version.outputs.version }}" \
              --repo 6b6t/AnarchyClient \
              --pattern "${{ steps.release_file.outputs.name }}" \
              --clobber

            gh attestation verify "${{ steps.release_file.outputs.name }}" \
              --repo 6b6t/AnarchyClient \
              --cert-identity "https://github.com/6b6t/AnarchyClient/.github/workflows/release.yml@${{ github.ref }}" \
              --source-ref "${{ github.ref }}" \
              --source-digest "${{ github.sha }}" \
              --signer-digest "${{ github.sha }}" \
              --deny-self-hosted-runners
            ```

            ${{ steps.github_release.outputs.changelog }}
          files: build/libs/${{ steps.release_file.outputs.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
